name: Nightly universal build

# One universal (arm64 + x86_64 in one binary) .dmg per commit to main, published
# as a GitHub prerelease. This is separate from build-universal.yml, which is the
# manually-triggered, matrix (separate arm64/intel artifacts) release process.
# See #104: today's releases only ever shipped a native-arch build; buildapp.sh's
# `universal` case was already there but had never actually been wired into CI —
# worse, buildapp.sh itself silently ignored its architecture argument (see the
# fix in that script), so even running it by hand never really produced one.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-universal
  cancel-in-progress: false

jobs:
  build:
    name: Build universal .dmg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select latest available Xcode
        # See the same step in ci.yml / build-universal.yml.
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null \
            | sed 's#.*/Xcode_##; s/\.app$//' \
            | sort -t. -k1,1n -k2,2n -k3,3n \
            | tail -1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "/Applications/Xcode_${LATEST}.app"
          fi
          xcodebuild -version

      - name: Build universal DMG
        run: |
          chmod +x buildapp.sh
          bash buildapp.sh universal

      - name: Compute tag
        id: tag
        run: |
          TAG="nightly-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Delete previous nightly prereleases
        # Keep only the one we're about to publish — otherwise these accumulate
        # forever, one per commit to main. Deletes both the release and its tag.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 200 --json tagName \
            --jq '.[] | select(.tagName | startswith("nightly-")) | .tagName' \
          | while read -r old_tag; do
              echo "Deleting old nightly release: $old_tag"
              gh release delete "$old_tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
            done

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Nightly ${{ steps.tag.outputs.tag }}
          prerelease: true
          generate_release_notes: true
          files: MacNCheese-universal.dmg
