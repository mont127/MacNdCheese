name: Build & Release MacNCheese

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            dmg: MacNCheese-arm64.dmg
            artifact: arm64
          - arch: x86_64
            dmg: MacNCheese-intel.dmg
            artifact: intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest available Xcode
        # See the same step in .github/workflows/ci.yml: GameGridView.swift needs the
        # macOS 26 SDK to even compile the `#available(macOS 26, *)` branch, and
        # macos-latest runners have been a mixed fleet during the rolling migration
        # to the macOS 26 image (started 2026-06-15). Pick the newest Xcode_*.app
        # actually present instead of trusting whatever xcode-select defaults to.
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null \
            | sed 's#.*/Xcode_##; s/\.app$//' \
            | sort -t. -k1,1n -k2,2n -k3,3n \
            | tail -1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "/Applications/Xcode_${LATEST}.app"
          fi
          xcodebuild -version

      - name: Install Rosetta (for Intel build)
        if: matrix.arch == 'x86_64'
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Build DMG
        run: |
          chmod +x buildapp.sh
          bash buildapp.sh ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.dmg }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download arm64
        uses: actions/download-artifact@v4
        with:
          name: arm64
          path: out

      - name: Download intel
        uses: actions/download-artifact@v4
        with:
          name: intel
          path: out

      - name: Generate tag
        id: tag
        run: |
          TAG="auto-$(date +'%Y%m%d-%H%M%S')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: MacNCheese Build ${{ steps.tag.outputs.tag }}
          files: |
            out/MacNCheese-arm64.dmg
            out/MacNCheese-intel.dmg
          generate_release_notes: true