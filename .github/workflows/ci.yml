name: CI

# Fast build/syntax checks on every PR and push to main. This is deliberately
# separate from build-universal.yml (which produces signed, distributable
# .dmg releases via workflow_dispatch) — this workflow is meant to fail fast
# on every change, not to build a shippable artifact.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-swift:
    name: Build Swift app (debug)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select latest available Xcode
        # GameGridView.swift uses a macOS 26 SDK API behind `#available(macOS 26, *)`.
        # That's still a hard compile error on a toolchain whose SDK doesn't declare
        # the symbol at all, and macos-latest runners have been a mixed fleet during
        # the rolling migration to the macOS 26 image (started 2026-06-15) — some
        # pulls still only have an older Xcode with no macOS 26 SDK. Pick the newest
        # Xcode_*.app actually present so the build doesn't depend on which pull we
        # land on, instead of trusting whatever xcode-select defaults to.
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null \
            | sed 's#.*/Xcode_##; s/\.app$//' \
            | sort -t. -k1,1n -k2,2n -k3,3n \
            | tail -1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "/Applications/Xcode_${LATEST}.app"
          fi
          xcodebuild -version
      - name: swift build
        run: swift build --package-path Sources

  check-backend:
    name: Check backend/scripts syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile-check backend_server.py
        run: python3 -m py_compile backend_server.py
      - name: Compile-check the CLI (macndcheese)
        run: python3 -m py_compile macndcheese
      - name: Shell syntax check (bash -n)
        run: |
          bash -n install.sh
          bash -n buildapp.sh
          bash -n installer.sh
      - name: CLI parity check
        # See CONTRIBUTING.md's "CLI parity" section and
        # .github/scripts/check_cli_parity.py's docstring: fails if Swift
        # calls a backend command the CLI never references and that isn't in
        # the pre-existing-backlog allowlist.
        run: python3 .github/scripts/check_cli_parity.py
