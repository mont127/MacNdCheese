name: "Quality of Life feature"
description: Make something that already works easier, faster, or less annoying to use
title: "Feat QoL: "
labels: ["Feat QoL"]
body:
  - type: markdown
    attributes:
      value: |
        For improvements that don't add new game/launcher/architecture compatibility — that's the
        "Compatibility feature" template instead.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part(s) of the app does this touch? Pick more than one if it genuinely spans areas. Pick "Not sure" if none of them fit and a maintainer will route it.
      multiple: true
      options:
        - "Backend (Wine, DXVK, DXMT, D3DMetal, VKD3D, GPTK)"
        - "Apps (.exe/.msi support, bottles)"
        - "Steam"
        - "Epic Games"
        - "UI / Settings"
        - "Release (packaging, DMG, codesigning)"
        - "CI / build tooling"
        - "Documentation"
        - "Not sure"
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: How big a change is this?
      description: This drives the priority label.
      options:
        - "Small / easy addition"
        - "Bigger feature, or scope isn't clear yet"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What's the problem or annoyance today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach, if you have one
